environment: local

database:
  url: "sqlite+aiosqlite:///./elasticops.db"

# Background poller: fetches raw ES once per cycle, precomputes ready-to-serve snapshots.
polling:
  enabled: true
  health_seconds: 30 # light tick — cluster health only
  heavy_seconds: 90 # heavy tick — full refresh (nodes, indices, ~56K shards, recoveries)
  pivot_separator: "_" # index-name split char for the dynamic-depth pivot tree

# Secrets auto-generate into .elasticops-secrets.json on first run (gitignored).
# Set these explicitly in production:
# auth:
#   jwt_secret: "<run: python -c 'import secrets; print(secrets.token_urlsafe(48))'>"
# security:
#   encryption_key: "<run: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'>"
