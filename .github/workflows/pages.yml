name: Pages

# LIVE - the repository is public and Pages deploys on every push to main that
# touches site/ or this workflow. Custom domain (elasticops.jugraj.dev) is set
# server-side via the Pages API (workflow-deployed Pages ignores any CNAME file,
# so the domain lives in repo settings, not the artifact):
#   gh api -X PUT repos/jugrajsingh/ElasticOps/pages -f cname='elasticops.jugraj.dev' \
#     -F https_enforced=true
# DNS: elasticops -> jugrajsingh.github.io CNAME already present in the jugraj.dev
# Cloudflare zone (mirrors sluice.jugraj.dev).
# The deploy job is also guarded to no-op unless the repo is public, so a stray manual
# run against a re-privatized repo won't fail.

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.repository.visibility == 'public' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
