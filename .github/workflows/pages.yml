name: Pages

# DISABLED while this repository is PRIVATE - GitHub Pages requires a public repo
# (Free plan). The site under site/ is built and ready. To ENABLE when you go public:
#   1. Settings -> Pages -> Source: "GitHub Actions", then uncomment the `push:`
#      trigger below.
#   2. Set the custom domain server-side (workflow-deployed Pages ignores any CNAME
#      file, so the domain lives in repo settings, not the artifact):
#        gh api -X PUT repos/jugrajsingh/ElasticOps/pages -f cname='elasticops.jugraj.dev' \
#          -F https_enforced=false
#      then, once the TLS cert has issued, re-run with -F https_enforced=true.
#   3. DNS: add a DNS-only CNAME `elasticops -> jugrajsingh.github.io` in the jugraj.dev
#      Cloudflare zone (mirrors sluice.jugraj.dev).
# The deploy job is also guarded to no-op unless the repo is public, so a stray manual
# run while private won't fail.

on:
  # push:
  #   branches: [main]
  #   paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.repository.visibility == 'public' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
